<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PerfumeGuru | Luxury Fragrances</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #050407;

  --gold: #c9a256;

  overflow-x: hidden;
}

.admin-link {

  padding: 8px 18px !important;
}

/* Product Grid - Dynamic */
.products-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;

</style>
</head>
<body>

<!-- Your existing HTML structure up to the products section -->
<!-- Keep hero, marquee, etc. exactly as they were -->

<div id="collection">
<div class="section">
  <div class="s-label reveal">Our Collection</div>
  <h2 class="s-title reveal">Signature <em>Fragrances</em></h2>
  <p class="s-sub reveal">Each bottle is a masterpiece — carefully sourced, authenticated and delivered in luxury packaging.</p>

  <!-- Dynamic Products Grid -->
  <div class="products-grid" id="productsGrid">
    <div class="product-card" style="text-align:center; padding:60px;">Loading fragrances... ✨</div>
  </div>
</div>
</div>

<!-- Rest of your sections (Why Us, Reviews, CTA, Footer) remain identical -->

<script>
// API Configuration
const API_URL = 'https://sheetdb.io/api/v1/eizek3qs2z56o';

// Fetch and display products from SheetDB
async function loadProducts() {
  try {
    const response = await fetch(API_URL);
    const products = await response.json();
    
    // Filter only product entries (exclude discount codes)
    const productItems = products.filter(p => p.type === 'product' || p.name);
    
    if (productItems.length === 0) {
      // Show demo products if none in database
      showDemoProducts();
      return;
    }
    
    renderProducts(productItems);
  } catch (error) {
    console.error('Error loading products:', error);
    showDemoProducts();
  }
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  if (!grid) return;
  
  grid.innerHTML = products.map(product => `
    <div class="product-card reveal">
      <div class="product-img-wrap">
        <img src="${product.image || 'https://i.ibb.co/Xf9qRtPG/Screenshot-2026-04-06-19-35-27-759-com-zhiliaoapp-musically-2.jpg'}" alt="${product.name}" loading="lazy">
        <div class="product-overlay"></div>
        ${product.badge ? `<div class="product-badge">${product.badge}</div>` : ''}
      </div>
      <div class="product-info">
        <div class="product-type">${product.type || 'Eau de Parfum'}</div>
        <div class="product-name">${product.name}</div>
        <div class="product-desc">${product.description || 'A luxurious fragrance for the discerning individual.'}</div>
        <div class="product-notes">
          ${(product.notes || 'Oud, Amber, Vanilla').split(',').map(n => `<span class="note-pill">${n.trim()}</span>`).join('')}
        </div>
        <div class="product-footer">
          <div class="product-price">₦${product.price?.toLocaleString() || '35,000'}</div>
          <a href="https://wa.me/message/perfumeguru?text=I%20want%20to%20order%20${encodeURIComponent(product.name)}" class="product-wa">📱 Order</a>
        </div>
      </div>
    </div>
  `).join('');
  
  // Re-initialize reveal animations
  const reveals = document.querySelectorAll('.reveal');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  reveals.forEach(el => obs.observe(el));
}

function showDemoProducts() {
  const demoProducts = [
    { name: "Velvet Oud", type: "Eau de Parfum", price: 35000, badge: "Bestseller", image: "https://i.ibb.co/Xf9qRtPG/Screenshot-2026-04-06-19-35-27-759-com-zhiliaoapp-musically-2.jpg", notes: "Oud, Amber, Vanilla", description: "A rich, smoky oriental fragrance with deep oud wood." },
    { name: "Rose Élégante", type: "Eau de Toilette", price: 28000, badge: "New Arrival", image: "https://i.ibb.co/7JknY4sR/Screenshot-2026-04-06-19-36-18-378-com-zhiliaoapp-musically-2.jpg", notes: "Rose, Jasmine, Musk", description: "A sophisticated floral bouquet of Bulgarian rose." },
    { name: "Midnight Noir", type: "Parfum", price: 42000, badge: "", image: "https://i.ibb.co/VczFhQcN/Screenshot-2026-04-06-19-35-37-847-com-zhiliaoapp-musically-2.jpg", notes: "Iris, Vetiver, Currant", description: "Dark, mysterious and seductive." }
  ];
  renderProducts(demoProducts);
}

// Load products when page loads
document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
